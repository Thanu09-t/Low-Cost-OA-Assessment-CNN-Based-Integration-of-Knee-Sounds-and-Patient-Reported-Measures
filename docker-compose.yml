version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    environment:
      - SECRET_KEY=supersecretkeyforoainsightdevelopment12345!
      - UPLOAD_DIR=/app/uploads
      - DATABASE_URL=sqlite:////app/uploads/oa_insight.db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  uploads_data:
